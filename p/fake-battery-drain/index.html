<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f0f10" />
<title>Fake Battery Drain</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:#0f0f10;color:#fff;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;display:flex;justify-content:center;padding:12px}
.card{width:min(520px,95vw);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:14px}.bar{height:24px;border:2px solid rgba(255,255,255,.6);border-radius:6px;padding:2px;position:relative}.fill{height:100%;background:linear-gradient(135deg,#22c55e,#ef4444);border-radius:2px;width:100%;transition:width .7s}.badge{margin-top:10px;font-weight:900}.msg{margin-top:10px;color:rgba(255,255,255,.75)}.gotcha{display:none;margin-top:12px;font-weight:900;font-size:20px}.row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.btn{flex:1;min-width:140px;border:none;border-radius:12px;padding:11px 10px;font-weight:900}.primary{background:linear-gradient(135deg,#3a82f7,#7c3aed);color:#fff}.ghost{background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.1)}
</style>
</head>
<body>
<div class="card">
  <h1 style="margin:0;font-size:20px;">Battery Optimizer</h1>
  <p style="margin:7px 0 0;color:rgba(255,255,255,.72)">For fun only — this page cannot access real battery stats or device settings.</p>
  <div style="margin-top:14px" class="bar"><div id="fill" class="fill"></div></div>
  <div class="badge" id="pct">100%</div>
  <div class="msg" id="status">Stabilizing battery usage...</div>
  <div id="gotcha" class="gotcha">😂 GOTCHA</div>
  <div id="custom" class="msg"></div>
  <div class="row">
    <button class="btn ghost" id="shareBtn">Share</button>
    <button class="btn primary" id="homeBtn">Back to menu</button>
  </div>
</div>
<script>
const MAIN_PAGE_URL = "https://xstajayx.github.io/message-media-space/";
const PAGE_URL = "https://xstajayx.github.io/message-media-space/p/fake-battery-drain/";
const u = new URL(location.href); const msg = u.searchParams.get("msg");
const steps = [100,89,71,56,43,29,16,9,4,1,0];
const status = document.getElementById("status"); const fill = document.getElementById("fill"); const pct = document.getElementById("pct");
let i=0; (function tick(){
  const p = steps[i++]; fill.style.width = p + "%"; pct.textContent = p + "%";
  if(p>50) status.textContent = "Background apps consuming battery...";
  else if(p>10) status.textContent = "Critical usage detected ⚠️";
  else status.textContent = "Emergency mode...";
  if(i<steps.length) return setTimeout(tick, 850);
  document.getElementById("gotcha").style.display = "block";
  status.textContent = "Relax — prank only. Nothing on your phone was accessed.";
  if(msg){ document.getElementById("custom").textContent = msg; }
})();
async function doShare(){const shareUrl = msg ? PAGE_URL + "?msg=" + encodeURIComponent(msg) : PAGE_URL; const data={title:"Fake Battery Drain",text:"For fun 😈",url:shareUrl}; if(navigator.share){try{await navigator.share(data);return;}catch(e){}} try{await navigator.clipboard.writeText(shareUrl);alert("Link copied ✅");}catch(e){prompt("Copy link:",shareUrl);}}
document.getElementById("shareBtn").addEventListener("click",doShare);
document.getElementById("homeBtn").addEventListener("click",()=>location.href=MAIN_PAGE_URL);
</script>
</body>
</html>
