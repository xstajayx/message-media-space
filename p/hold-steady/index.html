<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/><meta name="theme-color" content="#0f0f10"/><title>Hold Steady</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:#0f0f10;color:#fff;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;display:flex;justify-content:center;padding:12px}.card{width:min(520px,95vw);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:14px}.panel{margin-top:10px;padding:16px;border:1px solid rgba(255,255,255,.1);border-radius:14px;background:rgba(0,0,0,.25);text-align:center}.timer{font-size:44px;font-weight:950;font-family:ui-monospace,Menlo,Consolas,monospace}.row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.btn{flex:1;min-width:130px;border:none;border-radius:12px;padding:11px;font-weight:900}.primary{background:linear-gradient(135deg,#3a82f7,#7c3aed);color:#fff}.ghost{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:#fff}</style></head><body>
<div class="card"><h1 style="margin:0;font-size:20px">Hold Steady</h1><p style="margin:7px 0 0;color:rgba(255,255,255,.72)">Hold the button, release near <b>3.00s</b>. Best of 3 rounds. For fun only.</p><div class="panel"><div id="round">Round 1 / 3</div><div class="timer" id="timer">0.00s</div><div id="hint" style="color:rgba(255,255,255,.75)">Press and hold to start</div></div><div class="row"><button id="holdBtn" class="btn primary">Press & Hold</button></div><div class="row"><button id="shareBtn" class="btn ghost" disabled>Share score</button><button id="homeBtn" class="btn ghost">Back to menu</button></div></div>
<script>
const MAIN='https://xstajayx.github.io/message-media-space/'; const GAME='hold-steady'; let start=0,raf=0,holding=false,round=1,total=0,last=0;
const roundEl=document.getElementById('round'); const timer=document.getElementById('timer'); const hint=document.getElementById('hint'); const holdBtn=document.getElementById('holdBtn'); const shareBtn=document.getElementById('shareBtn');
function tick(){if(!holding)return; last=(performance.now()-start)/1000; timer.textContent=last.toFixed(2)+'s'; raf=requestAnimationFrame(tick);} 
holdBtn.addEventListener('pointerdown',()=>{if(round>3)return; holding=true; start=performance.now(); hint.textContent='Release close to 3.00s'; cancelAnimationFrame(raf); raf=requestAnimationFrame(tick);},{passive:true});
function release(){ if(!holding)return; holding=false; cancelAnimationFrame(raf); const diff=Math.abs(3-last); const score=Math.max(0,1000-Math.round(diff*800)); total+=score; hint.textContent=`Round ${round} score: ${score}`; round++; if(round<=3){roundEl.textContent=`Round ${round} / 3`; timer.textContent='0.00s';} else {holdBtn.disabled=true; roundEl.textContent='Finished'; hint.textContent=`Final score: ${total} / 3000`; shareBtn.disabled=false; localStorage.setItem('best_'+GAME,String(Math.max(Number(localStorage.getItem('best_'+GAME)||0),total))); }}
holdBtn.addEventListener('pointerup',release,{passive:true}); holdBtn.addEventListener('pointercancel',release,{passive:true}); holdBtn.addEventListener('pointerleave',e=>{if(e.buttons===0)release();},{passive:true});
async function shareScore(){const u=new URL(MAIN);u.searchParams.set('game',GAME);u.searchParams.set('score',String(total));const text=`I scored ${total} in Hold Steady 🎛️`;const data={title:'Hold Steady',text,url:u.toString()}; if(navigator.share){try{await navigator.share(data);return;}catch(e){}}try{await navigator.clipboard.writeText(text+' '+u);alert('Copied ✅');}catch(e){prompt('Copy this:',text+' '+u);}}
shareBtn.addEventListener('click',shareScore); document.getElementById('homeBtn').addEventListener('click',()=>{const u=new URL(MAIN);if(total>0){u.searchParams.set('game',GAME);u.searchParams.set('score',String(total));} location.href=u.toString();});
</script></body></html>
