<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/><meta name="theme-color" content="#0f0f10"/><title>Swipe Dodge</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:#0f0f10;color:#fff;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;display:flex;justify-content:center;padding:12px}.card{width:min(520px,95vw);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:14px}.arena{margin-top:10px;height:260px;border:1px solid rgba(255,255,255,.12);border-radius:16px;background:rgba(0,0,0,.28);display:flex;align-items:center;justify-content:center;text-align:center;padding:12px}.big{font-size:34px;font-weight:950}.row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.btn{flex:1;min-width:130px;border:none;border-radius:12px;padding:11px;font-weight:900}.primary{background:linear-gradient(135deg,#3a82f7,#7c3aed);color:#fff}.ghost{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:#fff}</style></head><body>
<div class="card"><h1 style="margin:0;font-size:20px">Swipe Dodge</h1><p style="margin:7px 0 0;color:rgba(255,255,255,.72)">Swipe the prompted direction before time runs out. For fun only.</p><div class="arena" id="arena"><div><div class="big" id="prompt">Tap Start</div><div id="meta" style="margin-top:6px;color:rgba(255,255,255,.7)">Streak 0 • 20s</div></div></div><div class="row"><button class="btn primary" id="startBtn">Start</button></div><div class="row"><button class="btn ghost" id="shareBtn" disabled>Share score</button><button class="btn ghost" id="homeBtn">Back to menu</button></div></div>
<script>
const MAIN='https://xstajayx.github.io/message-media-space/'; const GAME='swipe-dodge';
const promptEl=document.getElementById('prompt'), meta=document.getElementById('meta'); let dir='left',streak=0,time=20,alive=false,timer=0,sx=0,sy=0;
function next(){dir=Math.random()<.5?'left':'right'; promptEl.textContent=dir==='left'?'⬅️ Swipe LEFT':'➡️ Swipe RIGHT'; meta.textContent=`Streak ${streak} • ${time}s`;}
function end(){alive=false; clearInterval(timer); promptEl.textContent='Game Over'; meta.textContent=`Final streak: ${streak}`; document.getElementById('shareBtn').disabled=streak===0; localStorage.setItem('best_'+GAME, String(Math.max(Number(localStorage.getItem('best_'+GAME)||0), streak)));}
function start(){streak=0;time=20;alive=true; next(); clearInterval(timer); timer=setInterval(()=>{time--; meta.textContent=`Streak ${streak} • ${time}s`; if(time<=0)end();},1000);} 
document.getElementById('startBtn').addEventListener('click',start);
const arena=document.getElementById('arena'); arena.addEventListener('pointerdown',e=>{sx=e.clientX;sy=e.clientY;},{passive:true}); arena.addEventListener('pointerup',e=>{if(!alive)return; const dx=e.clientX-sx,dy=e.clientY-sy; if(Math.abs(dx)<30 || Math.abs(dx)<Math.abs(dy)) return; const got=dx>0?'right':'left'; if(got===dir){streak++; next();} else end();},{passive:true});
async function shareScore(){const u=new URL(MAIN);u.searchParams.set('game',GAME);u.searchParams.set('score',String(streak));const text=`I got a ${streak} streak in Swipe Dodge ↔️`;const data={title:'Swipe Dodge',text,url:u.toString()}; if(navigator.share){try{await navigator.share(data);return;}catch(e){}} try{await navigator.clipboard.writeText(text+' '+u);alert('Copied ✅');}catch(e){prompt('Copy this:',text+' '+u);}}
document.getElementById('shareBtn').addEventListener('click',shareScore); document.getElementById('homeBtn').addEventListener('click',()=>{const u=new URL(MAIN);if(streak>0){u.searchParams.set('game',GAME);u.searchParams.set('score',String(streak));}location.href=u.toString();});
</script></body></html>
