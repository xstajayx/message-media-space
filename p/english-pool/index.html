<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/><meta name="theme-color" content="#0f0f10"/><title>English Pool</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:#0f0f10;color:#fff;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;display:flex;justify-content:center;padding:12px}.card{width:min(560px,96vw);background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:12px}canvas{width:100%;height:auto;border-radius:14px;background:#0f5f34;border:8px solid #4f2f14}.row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.btn{flex:1;min-width:130px;border:none;border-radius:12px;padding:11px;font-weight:900}.primary{background:linear-gradient(135deg,#3a82f7,#7c3aed);color:#fff}.ghost{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:#fff}</style></head><body>
<div class="card"><div style="display:flex;justify-content:space-between;gap:8px;align-items:center"><h1 style="margin:0;font-size:20px">English Pool</h1><div id="score">Score: 0</div></div><p style="margin:6px 0 8px;color:rgba(255,255,255,.74)">Drag from cue ball to aim power. For fun only — nothing is accessed on your phone.</p><canvas id="c" width="900" height="500"></canvas><div class="row"><button id="resetBtn" class="btn primary">Reset rack</button><button id="shareBtn" class="btn ghost">Share</button><button id="homeBtn" class="btn ghost">Back to menu</button></div></div>
<script>
const MAIN='https://xstajayx.github.io/message-media-space/'; const GAME='english-pool';
const cv=document.getElementById('c'),ctx=cv.getContext('2d'); const W=cv.width,H=cv.height,R=14,PR=22; let score=0;
const pockets=[[20,20],[W/2,18],[W-20,20],[20,H-20],[W/2,H-18],[W-20,H-20]];
const cue={x:W*0.25,y:H*0.5,vx:0,vy:0,c:'#fff',cue:true};
let balls=[];
function rack(){balls=[cue]; for(let i=0;i<8;i++){balls.push({x:W*0.68+(i%3)*30+Math.floor(i/3)*3,y:H*0.35+(i%3)*30+Math.floor(i/3)*45,vx:0,vy:0,c:i%2?'#f43f5e':'#fbbf24'});} score=0;updateScore();}
function updateScore(){document.getElementById('score').textContent='Score: '+score;}
function draw(){ctx.clearRect(0,0,W,H); ctx.fillStyle='#0f5f34';ctx.fillRect(0,0,W,H); ctx.fillStyle='#111'; pockets.forEach(p=>{ctx.beginPath();ctx.arc(p[0],p[1],PR,0,Math.PI*2);ctx.fill();});
for(const b of balls){ctx.beginPath();ctx.fillStyle=b.c;ctx.arc(b.x,b.y,R,0,Math.PI*2);ctx.fill();}
if(aiming){ctx.strokeStyle='rgba(255,255,255,.85)';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(cue.x,cue.y);ctx.lineTo(ax,ay);ctx.stroke();}
}
function physics(){for(const b of balls){b.x+=b.vx;b.y+=b.vy;b.vx*=0.99;b.vy*=0.99;if(Math.abs(b.vx)<0.02)b.vx=0;if(Math.abs(b.vy)<0.02)b.vy=0;if(b.x<R||b.x>W-R)b.vx*=-1,b.x=Math.max(R,Math.min(W-R,b.x));if(b.y<R||b.y>H-R)b.vy*=-1,b.y=Math.max(R,Math.min(H-R,b.y));}
for(let i=0;i<balls.length;i++)for(let j=i+1;j<balls.length;j++){const a=balls[i],b=balls[j];const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy);if(d>0&&d<R*2){const nx=dx/d,ny=dy/d,p=(a.vx*nx+a.vy*ny-b.vx*nx-b.vy*ny);a.vx-=p*nx;a.vy-=p*ny;b.vx+=p*nx;b.vy+=p*ny;const overlap=R*2-d;a.x-=nx*overlap/2;a.y-=ny*overlap/2;b.x+=nx*overlap/2;b.y+=ny*overlap/2;}}
for(let i=balls.length-1;i>=0;i--){const b=balls[i]; for(const p of pockets){if(Math.hypot(b.x-p[0],b.y-p[1])<PR){if(b.cue){score-=20; cue.x=W*0.25; cue.y=H*0.5; cue.vx=cue.vy=0;} else {balls.splice(i,1); score+=10;} updateScore(); break;}}}
if(balls.length===1){alert('Rack cleared!');saveToHub(); rack();}
}
function saveToHub(){const u=new URL(MAIN);u.searchParams.set('game',GAME);u.searchParams.set('score',String(score)); history.replaceState({},'',location.pathname); localStorage.setItem('best_'+GAME,String(Math.max(Number(localStorage.getItem('best_'+GAME)||0),score))); saveToHub.last=u.toString();}
let aiming=false,ax=0,ay=0; cv.addEventListener('pointerdown',e=>{const r=cv.getBoundingClientRect(),x=(e.clientX-r.left)*(W/r.width),y=(e.clientY-r.top)*(H/r.height); if(Math.hypot(x-cue.x,y-cue.y)<40){aiming=true;ax=x;ay=y;}},{passive:true}); cv.addEventListener('pointermove',e=>{if(!aiming)return; const r=cv.getBoundingClientRect();ax=(e.clientX-r.left)*(W/r.width);ay=(e.clientY-r.top)*(H/r.height);},{passive:true}); cv.addEventListener('pointerup',()=>{if(!aiming)return; const dx=cue.x-ax,dy=cue.y-ay,p=Math.min(24,Math.hypot(dx,dy)/6); const d=Math.hypot(dx,dy)||1; cue.vx+=(dx/d)*p; cue.vy+=(dy/d)*p; aiming=false;},{passive:true});
document.getElementById('resetBtn').addEventListener('click',()=>{if(score!==0)saveToHub(); rack();});
async function share(){const u=new URL(MAIN);u.searchParams.set('game',GAME);u.searchParams.set('score',String(score));const text=`My English Pool score: ${score} 🎱`;const data={title:'English Pool',text,url:u.toString()};if(navigator.share){try{await navigator.share(data);return;}catch(e){}}try{await navigator.clipboard.writeText(text+' '+u);alert('Copied ✅');}catch(e){prompt('Copy this:',text+' '+u);}}
document.getElementById('shareBtn').addEventListener('click',share);document.getElementById('homeBtn').addEventListener('click',()=>{const u=new URL(MAIN);u.searchParams.set('game',GAME);u.searchParams.set('score',String(score));location.href=u.toString();});
rack();(function loop(){physics();draw();requestAnimationFrame(loop);})();
</script></body></html>
